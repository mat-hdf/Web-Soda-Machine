<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máquina de Refrigerantes</title>
    <script src="app.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
        <div class="row d-flex flex-row align-items-center">
            <div id="printer" class="col-4">
                <div class="d-flex align-items-baseline gap-2 mb-4">
                <h3 id="price" class="m-0">Price:</h3>
                <div id="pricearea" class="m-0"></div>
            </div>
            </div>
            <div class="col-4">
                <div class="moeda moeda-25" valor="0.25" draggable="true">25c</div>
                <div class="moeda moeda-50" valor="0.5" draggable="true">50c</div>
                <div class="moeda moeda-100" valor="1" draggable="true">1R</div>
            </div>
            <div class="col-4 d-flex flex-column align-items-center">
                <h3 id="visor">0.00</h3>
                <img src="./imgs/sodamachine.jpg" class="img-fluid" alt="Soda Machine" id="machine">
                <button id="buy" class="mt-4">BUY</button>
            </div>
        </div>
        <div id="msg" class="m-5"></div>
    </div>
</body>
</html>
